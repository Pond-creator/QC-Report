<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สร้างใบตรวจ QC — QC Report</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="lib/flatpickr.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="topbar">
    <div class="brand">QC/QA Report<small>APOSTROPHE L CO.,LTD</small></div>
    <nav>
      <a href="form.html" class="active">สร้างใบตรวจ</a>
      <a href="reports.html">รายงาน</a>
    </nav>
    <div class="user-box">
      <span id="userName"></span>
      <span class="role-badge" id="userRole"></span>
      <button class="logout-btn" onclick="Auth.logout()">ออกจากระบบ</button>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <h2 id="pageTitle">ใบตรวจสอบคุณภาพสินค้า (QC Report)</h2>
      <div class="grid-2 form-fields">
        <div class="field field-red f-supplier-name">
          <label>Supplier Name</label>
          <input type="text" id="supplier_name">
        </div>
        <div class="field field-red f-supplier-code">
          <label>Supplier Item Code <span class="req">*</span></label>
          <input type="text" id="supplier_code">
        </div>
        <div class="field field-red f-stock-code">
          <label>Stock Code <span class="req">*</span></label>
          <input type="text" id="stock_code">
        </div>
        <div class="field field-red f-ean13">
          <label>EAN 13 Code</label>
          <input type="text" id="ean13">
        </div>
        <div class="field field-red f-date-in">
          <label>Date สินค้าเข้า (Date In) <span class="req">*</span></label>
          <input type="text" id="date_in" placeholder="เลือกวันที่" readonly>
        </div>
        <div class="field field-red f-date-qa">
          <label>Date QA สินค้า (QA Date) <span class="req">*</span></label>
          <input type="text" id="date_qa" placeholder="เลือกวันที่" readonly>
        </div>
        <div class="field field-red f-description full-row">
          <label>Description <span class="req">*</span></label>
          <input type="text" id="description">
        </div>
        <div class="field field-red f-order full-row">
          <label>Order (Pcs) <span class="req">*</span></label>
          <input type="number" min="0" id="order_qty" value="0">
        </div>
      </div>

      <div class="summary-row">
        <div class="summary-box summary-accepted" id="sumAcceptedBox">
          <div class="lbl">Accepted Quality</div>
          <div class="val" id="sumAccepted">0</div>
        </div>
        <div class="summary-box summary-defected">
          <div class="lbl">Defected Quality</div>
          <div class="val" id="sumDefected">0</div>
        </div>
        <div class="summary-box summary-rejected">
          <div class="lbl">Rejected Quality</div>
          <div class="val" id="sumRejected">0</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Reason for Defected and Rejected</h2>
      <div id="reasonList"></div>
      <button type="button" class="btn btn-ghost" id="btnAddReason">+ เพิ่มการตรวจสอบ</button>
    </div>

    <div class="card" id="signCard">
      <div class="sign-row" id="signRowWrap">
        <div class="sign-box">
          <div class="sign-canvas-preview" id="verifiedPreview"><span class="placeholder">ยังไม่เซ็นชื่อ</span></div>
          <button type="button" class="btn btn-ghost btn-sm" id="btnSignVerified">✍️ Sign</button>
          <div class="sign-name-label">Verified by</div>
          <input type="text" id="verified_by" placeholder="ชื่อผู้ตรวจสอบ">
          <div class="date-field">
            <input type="text" id="verified_date" placeholder="Date" readonly>
          </div>
        </div>
      </div>
      <div class="submit-row">
        <button type="button" class="btn btn-primary" id="btnSubmit" style="padding:12px 40px">ส่งข้อมูล</button>
      </div>
    </div>
  </div>

  <script src="lib/flatpickr.min.js"></script>
  <script src="lib/flatpickr-th.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/signature.js"></script>
  <script src="js/form.js"></script>
</body>
</html>
